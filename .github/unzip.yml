name: Build Debug APK

on:
  workflow_dispatch:     # Only runs when you manually trigger it

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- NEW STEP -------------------------------------------------------
      # If Escape-pOd-main.zip is sitting in the repo (instead of its
      # contents), unzip it and flatten the top-level Escape-pOd-main/
      # folder into the repo root so ./www, ./android, etc. exist where
      # `cap sync` and Gradle expect them.
      - name: Unzip project archive (if present)
        run: |
          if [ -f Escape-pOd-main.zip ]; then
            echo "Found Escape-pOd-main.zip — extracting..."
            unzip -o Escape-pOd-main.zip -d _unzip_tmp
            shopt -s dotglob
            cp -r _unzip_tmp/Escape-pOd-main/* .
            rm -rf _unzip_tmp Escape-pOd-main.zip
            echo "Extracted. Repo root now contains:"
            ls -la
          else
            echo "No zip found, skipping (www/ is presumably already committed)."
          fi
      # ---------------------------------------------------------------------

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HLF-Escape-Pod-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
