name: Build Escape Pod APK

on:
  workflow_dispatch:
    inputs:
      zip_artifact:
        description: 'Name of zip artifact to build (optional, uses latest commit if empty)'
        required: false
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Unzip project if needed
        run: |
          if [ -f "*.zip" ]; then
            unzip -q Escape-pOd*.zip
            mv Escape-pOd-main/* . || true
            rm -rf Escape-pOd-main *.zip
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build Android APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: escape-pod-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: escape-pod-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 15
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
